name: Deploy Backend to Render

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          cd server
          npm ci
      - name: Deploy to Render via API (create/update service)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          echo "Deploy to Render - please configure Render web service to auto-deploy from GitHub or use Render API to trigger deploy."
          # Optionally implement Render API deploy here
