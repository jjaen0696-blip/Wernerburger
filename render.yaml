# Render Blueprint — despliega WernerBurguer (Vite + React) como Static Site.
# No usa puerto: Render solo sirve los archivos pre-compilados de ./dist,
# por eso NO da el error "port scan timeout" propio de los Web Service.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: wernerburger
    runtime: static
    buildCommand: npm run build
    staticPublishPath: ./dist
    # Vite incrusta estas variables EN BUILD. Ambas son claves PÚBLICAS
    # (la anon key ya viaja dentro del bundle JS que se sirve al navegador),
    # por eso van inline y el deploy funciona desde GitHub sin config manual.
    envVars:
      - key: VITE_SUPABASE_URL
        value: https://uhodpfcajtnrmofabyyt.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVob2RwZmNhanRucm1vZmFieXl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MjcxNTgsImV4cCI6MjA5ODAwMzE1OH0.OoTWzxnquodS7WizMibnv-9CpsQTtw1v-o9DfCGw-oY
    # La app usa hash routing (#/cocina), así que este rewrite no es imprescindible,
    # pero deja listo el fallback SPA por si se añaden rutas por path más adelante.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
