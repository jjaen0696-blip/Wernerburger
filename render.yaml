services:
  - type: web
    name: wernerburger
    env: node
    region: oregon
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
    healthCheckPath: /
    routes:
      - type: http
        path: /*
        destination: dist/index.html
